version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ktm-postgres
    environment:
      POSTGRES_USER: ktm_user
      POSTGRES_PASSWORD: ktm_password
      POSTGRES_DB: ktm_digital
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
